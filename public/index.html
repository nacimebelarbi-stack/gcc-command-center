<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GCC Aerospace Command Center</title>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/cesium@latest/Build/Cesium/Widgets/widgets.css" />

  <script src="https://cdn.jsdelivr.net/npm/cesium@latest/Build/Cesium/Cesium.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #cesiumContainer { width: 100vw; height: 100vh; }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 10px;
      color: #00ffcc;
      background: rgba(0,0,0,0.6);
      border: 1px solid #00ffcc;
      font-family: monospace;
      z-index: 10;
    }
  </style>
</head>

<body>

  <div id="hud">GCC AEROSPACE COMMAND CENTER</div>
  <div id="cesiumContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>

</body>
</html>
